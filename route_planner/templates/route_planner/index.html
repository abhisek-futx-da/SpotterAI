<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Fuel Optimizer - Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- Custom Styles -->
    <style>
        :root {
            --bg-base: #0b0f19;
            --bg-surface: rgba(17, 24, 39, 0.7);
            --bg-card: rgba(31, 41, 55, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-amber: #f59e0b;
            --font-family: 'Plus Jakarta Sans', sans-serif;
            --font-title: 'Outfit', sans-serif;
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            --glass-blur: blur(16px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-base);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* App Layout */
        .app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 420px;
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border-color);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--accent-green));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.25rem;
            color: #fff;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .brand-text h1 {
            font-family: var(--font-title);
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-text p {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .section-title {
            font-family: var(--font-title);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
            background-color: rgba(255, 255, 255, 0.08);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* Preset Buttons */
        .presets-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .preset-btn {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.8rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .preset-btn:hover {
            background-color: rgba(255, 255, 255, 0.08);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.15);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 0.9rem;
            font-family: var(--font-title);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Map area */
        .map-container {
            flex-grow: 1;
            height: 100%;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Overlay Cards */
        .overlay-panel {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 1000;
            width: 380px;
            max-height: calc(100vh - 3rem);
            pointer-events: none; /* Let clicks pass through empty spaces */
        }

        .overlay-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: 1.25rem;
            box-shadow: var(--shadow-lg);
            pointer-events: auto; /* Enable clicks inside cards */
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        /* Statistics Layout */
        .stats-header {
            font-family: var(--font-title);
            font-size: 1rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .stat-item {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .stat-item.highlighted {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(16, 185, 129, 0.1));
            border-color: rgba(99, 102, 241, 0.2);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-family: var(--font-title);
            font-size: 1.15rem;
            font-weight: 700;
        }

        /* Stops List */
        .stops-container {
            overflow-y: auto;
            max-height: calc(100vh - 420px);
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding-right: 0.25rem;
            flex-shrink: 0;
        }

        .stops-container::-webkit-scrollbar {
            width: 4px;
        }

        .stops-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        .stop-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            flex-shrink: 0;
        }

        .stop-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background-color: var(--accent-amber);
            opacity: 0.8;
        }

        .stop-card:hover {
            transform: translateX(4px);
            background-color: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .stop-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .stop-title {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stop-price {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent-green);
            background-color: rgba(16, 185, 129, 0.12);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .stop-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }

        .stop-details {
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            color: var(--text-primary);
            margin-top: 0.25rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 0.25rem;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(11, 15, 25, 0.8);
            z-index: 10000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            backdrop-filter: blur(8px);
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(99, 102, 241, 0.15);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            font-family: var(--font-title);
            font-size: 1.15rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            background: linear-gradient(to right, #fff, var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            max-width: 480px;
            text-align: center;
            z-index: 99999;
            backdrop-filter: blur(12px);
            animation: fadeInUp 0.25s ease;
        }
        .error-toast strong { color: #f87171; display: block; margin-bottom: 0.25rem; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(12px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Map styling overrides */
        .leaflet-container {
            background: #0f172a !important;
        }
        .leaflet-bar {
            border: 1px solid var(--border-color) !important;
            background-color: var(--bg-surface) !important;
            backdrop-filter: var(--glass-blur);
            box-shadow: var(--shadow-lg) !important;
            border-radius: 8px !important;
            overflow: hidden;
        }
        .leaflet-bar a {
            background-color: rgba(31, 41, 55, 0.8) !important;
            color: var(--text-primary) !important;
            border-bottom: 1px solid var(--border-color) !important;
            transition: all 0.2s;
        }
        .leaflet-bar a:hover {
            background-color: var(--primary) !important;
            color: #fff !important;
        }
        .leaflet-popup-content-wrapper {
            background-color: #1f2937 !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--border-color);
            border-radius: 12px !important;
            padding: 0.25rem;
        }
        .leaflet-popup-tip {
            background-color: #1f2937 !important;
        }

        /* Custom Div Icons */
        .map-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            color: white;
            font-weight: bold;
            font-size: 0.75rem;
        }
        .map-icon-start {
            background-color: var(--accent-green);
        }
        .map-icon-finish {
            background-color: var(--accent-red);
        }
        .map-icon-stop {
            background-color: var(--accent-amber);
            border-color: #0b0f19;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive Styling */
        @media (max-width: 900px) {
            .app-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: 45vh;
                order: 2;
                border-right: none;
                border-top: 1px solid var(--border-color);
                padding: 1.25rem;
            }
            .map-container {
                height: 55vh;
                order: 1;
            }
            .overlay-panel {
                top: 0.75rem;
                right: 0.75rem;
                left: 0.75rem;
                width: auto;
                max-height: 45vh;
            }
            .overlay-card-stops {
                display: none; /* Hide stops overlay on mobile, focus on map */
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <header class="brand">
                <div class="brand-logo">⚡</div>
                <div class="brand-text">
                    <h1>Fuel Optimizer</h1>
                    <p>AI-Powered Route & Spend Planner</p>
                </div>
            </header>

            <section>
                <h3 class="section-title">Presets</h3>
                <div class="presets-grid">
                    <button class="preset-btn" onclick="applyPreset('New York, NY', 'Chicago, IL')">
                        New York → Chicago
                    </button>
                    <button class="preset-btn" onclick="applyPreset('New York, NY', 'Los Angeles, CA')">
                        New York → Los Angeles
                    </button>
                    <button class="preset-btn" onclick="applyPreset('Miami, FL', 'Houston, TX')">
                        Miami → Houston
                    </button>
                    <button class="preset-btn" onclick="applyPreset('Boston, MA', 'Miami, FL')">
                        Boston → Miami
                    </button>
                </div>
            </section>

            <form id="optimizer-form" onsubmit="calculateRoute(event)">
                <section style="display: flex; flex-direction: column; gap: 1rem;">
                    <h3 class="section-title">Route Settings</h3>
                    
                    <div class="form-group">
                        <label for="start-input">Start Location</label>
                        <input type="text" id="start-input" placeholder="City, State or lat,lon" required value="New York, NY">
                    </div>

                    <div class="form-group">
                        <label for="finish-input">Finish Location</label>
                        <input type="text" id="finish-input" placeholder="City, State or lat,lon" required value="Chicago, IL">
                    </div>

                    <h3 class="section-title" style="margin-top: 0.5rem;">Vehicle Parameters</h3>
                    
                    <div class="input-row">
                        <div class="form-group">
                            <label for="max-range-input">Max Range (mi)</label>
                            <input type="number" id="max-range-input" min="50" max="2000" required value="500">
                        </div>
                        <div class="form-group">
                            <label for="starting-range-input">Start Fuel Range (mi)</label>
                            <input type="number" id="starting-range-input" min="0" max="2000" required value="500">
                        </div>
                    </div>

                    <div class="input-row">
                        <div class="form-group">
                            <label for="mpg-input">Efficiency (MPG)</label>
                            <input type="number" id="mpg-input" min="1" max="100" step="0.1" required value="10">
                        </div>
                        <div class="form-group">
                            <label for="corridor-input">Corridor (mi)</label>
                            <input type="number" id="corridor-input" min="1" max="100" required value="25">
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">
                        <span>Optimize Fuel Route</span>
                        <span>⚡</span>
                    </button>
                </section>
            </form>
        </aside>

        <!-- Map Workspace -->
        <main class="map-container">
            <div id="map"></div>

            <!-- Loading Spinner -->
            <div class="loading-overlay" id="loading-overlay">
                <div class="spinner"></div>
                <div class="loading-text" id="loading-text">Analyzing routes and fuel prices...</div>
            </div>

            <!-- Floating Overlay Dashboard -->
            <div class="overlay-panel" id="overlay-panel" style="display: none;">
                <!-- Summary Card -->
                <div class="overlay-card">
                    <div class="stats-header">
                        <span>Route Optimizer Summary</span>
                        <span style="font-size: 0.75rem; color: var(--accent-green); cursor: pointer;" id="osm-link-span">OSM Directions ↗</span>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item highlighted">
                            <span class="stat-label">Total Spend</span>
                            <span class="stat-value" id="stat-cost">$0.00</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Total Gallons</span>
                            <span class="stat-value" id="stat-gallons">0.00 gal</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Fuel Stops</span>
                            <span class="stat-value" id="stat-stops">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Distance</span>
                            <span class="stat-value" id="stat-distance">0.00 mi</span>
                        </div>
                    </div>
                </div>

                <!-- Stops Timeline Card -->
                <div class="overlay-card overlay-card-stops" id="stops-card" style="display: none;">
                    <div class="stats-header">
                        <span>Optimal Fuel Stops</span>
                        <span id="stops-count-badge" style="font-size: 0.75rem; background: rgba(255,255,255,0.08); padding: 0.1rem 0.4rem; border-radius: 4px;">0</span>
                    </div>
                    <div class="stops-container" id="stops-container">
                        <!-- Stops cards populated dynamically -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Leaflet JS Library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // Initialize Map centered on USA
        const map = L.map('map', {
            zoomControl: false
        }).setView([37.8, -96], 4);
        
        L.control.zoom({
            position: 'bottomleft'
        }).addTo(map);

        // Dark theme map tiles (CartoDB Dark Matter)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Store layers to clear later
        let routeLayer = null;
        const markerLayers = [];
        let routeData = null;
        let activeAbortController = null;

        // Apply Preset helper
        function applyPreset(start, finish) {
            document.getElementById('start-input').value = start;
            document.getElementById('finish-input').value = finish;
            document.getElementById('optimizer-form').dispatchEvent(new Event('submit'));
        }

        // Parse coordinates helper
        function parseCoordinates(inputStr) {
            const parts = inputStr.split(',').map(s => s.trim());
            if (parts.length === 2) {
                const lat = parseFloat(parts[0]);
                const lon = parseFloat(parts[1]);
                if (!isNaN(lat) && !isNaN(lon)) {
                    return { lat, lon, label: inputStr };
                }
            }
            return null;
        }

        // Main function to fetch and display the optimal route
        async function calculateRoute(e) {
            if (e) e.preventDefault();

            // Cancel any pending request to avoid overlapping route drawings
            if (activeAbortController) {
                activeAbortController.abort();
            }
            activeAbortController = new AbortController();
            const { signal } = activeAbortController;

            const startVal = document.getElementById('start-input').value.trim();
            const finishVal = document.getElementById('finish-input').value.trim();
            const maxRange = parseFloat(document.getElementById('max-range-input').value);
            const startingRange = parseFloat(document.getElementById('starting-range-input').value);
            const mpg = parseFloat(document.getElementById('mpg-input').value);
            const corridor = parseFloat(document.getElementById('corridor-input').value);

            // Clean previous drawings
            if (routeLayer) {
                map.removeLayer(routeLayer);
                routeLayer = null;
            }
            markerLayers.forEach(layer => map.removeLayer(layer));
            markerLayers.length = 0;
            document.getElementById('overlay-panel').style.display = 'none';
            document.getElementById('stops-card').style.display = 'none';

            // Show spinner
            const loader = document.getElementById('loading-overlay');
            loader.style.display = 'flex';

            const startCoord = parseCoordinates(startVal);
            const finishCoord = parseCoordinates(finishVal);

            const payload = {
                start: startCoord || startVal,
                finish: finishCoord || finishVal,
                max_range_miles: maxRange,
                starting_range_miles: startingRange,
                mpg: mpg,
                corridor_miles: corridor
            };

            try {
                const response = await fetch('/api/routes/optimize/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    signal: signal,
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Server error occurred');
                }

                routeData = data;
                renderPlan(data);
            } catch (err) {
                if (err.name === 'AbortError') {
                    // Aborted request, exit silently
                    return;
                }
                console.error(err);
                const toast = document.createElement('div');
                toast.className = 'error-toast';
                toast.innerHTML = `<strong>Optimization Failed</strong>${err.message}`;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 6000);
            } finally {
                // Only hide spinner if this request is still active
                if (!signal.aborted) {
                    loader.style.display = 'none';
                }
            }
        }

        // Render GeoJSON and Update UI Stats
        function renderPlan(data) {
            // Draw Route & Stops GeoJSON
            routeLayer = L.geoJSON(data.map.geojson, {
                style: function (feature) {
                    if (feature.properties && feature.properties.kind === 'route') {
                        return {
                            color: '#6366f1',
                            weight: 5,
                            opacity: 0.85
                        };
                    }
                },
                pointToLayer: function (feature, latlng) {
                    const kind = feature.properties.kind;
                    let iconClass = 'map-icon ';
                    let htmlChar = '';
                    let label = '';
                    
                    if (kind === 'start') {
                        iconClass += 'map-icon-start';
                        htmlChar = 'S';
                        label = 'Start: ' + feature.properties.label;
                    } else if (kind === 'finish') {
                        iconClass += 'map-icon-finish';
                        htmlChar = 'F';
                        label = 'Destination: ' + feature.properties.label;
                    } else if (kind === 'fuel_stop') {
                        iconClass += 'map-icon-stop';
                        htmlChar = '⛽';
                        label = `<strong>${feature.properties.name}</strong><br>Price: $${feature.properties.price_per_gallon.toFixed(3)}/gal<br>Route Mile: ${feature.properties.route_mile} mi`;
                    }

                    const icon = L.divIcon({
                        className: iconClass,
                        html: htmlChar,
                        iconSize: [28, 28],
                        iconAnchor: [14, 14]
                    });

                    const marker = L.marker(latlng, { icon: icon });
                    marker.bindPopup(label);
                    markerLayers.push(marker);
                    return marker;
                }
            }).addTo(map);

            // Fit map bounds to the route
            if (routeLayer) {
                map.fitBounds(routeLayer.getBounds(), {
                    padding: [50, 50]
                });
            }

            // Update Summary Stats Card
            document.getElementById('stat-cost').innerText = `$${data.fuel_plan.total_cost_usd.toFixed(2)}`;
            document.getElementById('stat-gallons').innerText = `${data.fuel_plan.total_gallons_purchased.toFixed(2)} gal`;
            document.getElementById('stat-stops').innerText = data.fuel_plan.stops.length;
            document.getElementById('stat-distance').innerText = `${data.route.distance_miles.toFixed(1)} mi`;
            
            // Setup directions URL
            const osmSpan = document.getElementById('osm-link-span');
            osmSpan.onclick = () => window.open(data.map.openstreetmap_url, '_blank');

            // Render Stops list
            const stopsContainer = document.getElementById('stops-container');
            stopsContainer.innerHTML = '';
            
            if (data.fuel_plan.stops.length > 0) {
                document.getElementById('stops-card').style.display = 'flex';
                document.getElementById('stops-count-badge').innerText = data.fuel_plan.stops.length;

                data.fuel_plan.stops.forEach((stop, index) => {
                    const card = document.createElement('div');
                    card.className = 'stop-card';
                    card.onclick = () => focusStop(stop.lat, stop.lon, index);

                    card.innerHTML = `
                        <div class="stop-header">
                            <span class="stop-title" title="${stop.name}">${index + 1}. ${stop.name}</span>
                            <span class="stop-price">$${stop.price_per_gallon.toFixed(3)}</span>
                        </div>
                        <div class="stop-meta">
                            <span>${stop.city}, ${stop.state}</span>
                            <span>Mile: ${stop.route_mile.toFixed(1)} mi</span>
                        </div>
                        <div class="stop-details">
                            <span>Purchase: <strong>${stop.gallons.toFixed(2)} gal</strong></span>
                            <span>Cost: <strong>$${stop.cost_usd.toFixed(2)}</strong></span>
                        </div>
                    `;
                    stopsContainer.appendChild(card);
                });
            }

            // Display floating panel
            document.getElementById('overlay-panel').style.display = 'flex';
        }

        // Focus map on selected stop
        function focusStop(lat, lon, index) {
            map.setView([lat, lon], 12);
            
            // Find the correct stop marker and open its popup
            markerLayers.forEach(marker => {
                const ll = marker.getLatLng();
                if (Math.abs(ll.lat - lat) < 0.0001 && Math.abs(ll.lng - lon) < 0.0001) {
                    marker.openPopup();
                }
            });
        }
    </script>
</body>
</html>
